name: blisscoders_store
description: "BlissCoders Store - An ecommerce app with Stripe payment integration."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  
  # Dependency Injection
  get_it: ^8.0.3
  
  # Local Storage
  shared_preferences: ^2.3.4
  
  # Payment Gateway (Stripe - Free for test mode)
  flutter_stripe: ^11.3.0
  
  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0
  image_picker: ^1.1.2
  image_cropper: ^8.0.2
  
  # Navigation
  go_router: ^14.6.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
